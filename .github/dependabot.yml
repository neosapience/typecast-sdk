version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/typecast-python"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directories:
      - "/typecast-js"
      - "/typecast-js/examples"
      - "/test-fixtures/mock-server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    ignore:
      # TypeScript 7 exceeds the current typescript-eslint peer range.
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
      # ESLint 9+ requires migrating the existing eslintrc configuration.
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      # Vitest 4 changes branch instrumentation and breaks the 100% coverage gate.
      - dependency-name: "vitest"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@vitest/coverage-v8"
        update-types:
          - "version-update:semver-major"
    groups:
      javascript-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "maven"
    directory: "/typecast-java"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    ignore:
      # JUnit 6 requires Java 17 while this SDK targets Java 8.
      - dependency-name: "org.junit.jupiter:junit-jupiter"
        update-types:
          - "version-update:semver-major"
    groups:
      java-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "gradle"
    directory: "/typecast-kotlin"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    ignore:
      # JUnit 5.12+ conflicts with Kotlin test overloads; JUnit 6 also requires Java 17.
      - dependency-name: "org.junit.jupiter:junit-jupiter"
        versions:
          - ">=5.12.0"
      # CodeQL 2.26.1 supports Kotlin versions below 2.4.10.
      - dependency-name: "jvm"
        versions:
          - ">=2.4.10"
      - dependency-name: "plugin.serialization"
        versions:
          - ">=2.4.10"
    groups:
      kotlin-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/typecast-csharp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    ignore:
      # Coverlet 8+ changes instrumentation and breaks the 100% coverage gate.
      - dependency-name: "coverlet.collector"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "coverlet.msbuild"
        update-types:
          - "version-update:semver-major"
      # FluentAssertions 8 changed from Apache-2.0 to a commercial license.
      - dependency-name: "FluentAssertions"
        update-types:
          - "version-update:semver-major"
    groups:
      csharp-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/typecast-rust"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      rust-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "bundler"
    directory: "/typecast-ruby"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      ruby-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "composer"
    directories:
      - "/"
      - "/typecast-php"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      php-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "pub"
    directory: "/typecast-dart"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      dart-dependencies:
        patterns:
          - "*"
