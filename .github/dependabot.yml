version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/typecast-python"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directories:
      - "/typecast-js"
      - "/typecast-js/examples"
      - "/test-fixtures/mock-server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      javascript-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "maven"
    directory: "/typecast-java"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      java-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "gradle"
    directory: "/typecast-kotlin"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      kotlin-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/typecast-csharp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      csharp-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/typecast-rust"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      rust-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "bundler"
    directory: "/typecast-ruby"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      ruby-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "composer"
    directories:
      - "/"
      - "/typecast-php"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      php-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "pub"
    directory: "/typecast-dart"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      dart-dependencies:
        patterns:
          - "*"
