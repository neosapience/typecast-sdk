name: coverage-csharp

on:
  push:
    branches: [main]
    paths:
      - 'typecast-csharp/**'
      - '.github/workflows/coverage-csharp.yml'
  pull_request:
    paths:
      - 'typecast-csharp/**'
      - '.github/workflows/coverage-csharp.yml'

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - name: Restore dependencies
        working-directory: typecast-csharp
        run: dotnet restore

      - name: Run coverage (gate enforced by coverlet threshold)
        working-directory: typecast-csharp
        run: make coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-csharp
          path: typecast-csharp/tests/Typecast.Tests/TestResults/
