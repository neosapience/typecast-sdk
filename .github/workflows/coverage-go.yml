name: coverage-go

on:
  push:
    branches: [main]
    paths:
      - 'typecast-go/**'
      - '.github/workflows/coverage-go.yml'
  pull_request:
    paths:
      - 'typecast-go/**'
      - '.github/workflows/coverage-go.yml'

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download deps
        working-directory: typecast-go
        run: go mod download

      - name: Run coverage (gate enforced in Makefile)
        working-directory: typecast-go
        run: make coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-go
          path: typecast-go/coverage.out
