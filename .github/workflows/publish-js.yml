name: Publish JavaScript SDK

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @neosapience/typecast-js
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: typecast-js

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: typecast-js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Check OIDC availability
        run: |
          test -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN"
          test -n "$ACTIONS_ID_TOKEN_REQUEST_URL"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ""
          NPM_CONFIG_USERCONFIG: /tmp/npm-trusted-publisher.npmrc
        run: |
          printf 'registry=https://registry.npmjs.org/\n' > "$NPM_CONFIG_USERCONFIG"
          npm publish --provenance --access public
