name: Publish JavaScript SDK

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @neosapience/typecast-js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-js

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: typecast-js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ""
          NPM_CONFIG_USERCONFIG: /tmp/npm-trusted-publisher.npmrc
        run: |
          printf 'registry=https://registry.npmjs.org/\n' > "$NPM_CONFIG_USERCONFIG"
          npm publish --provenance --access public
