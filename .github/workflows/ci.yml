name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ============================================
  # Python SDK
  # ============================================
  test-python:
    name: Python SDK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    defaults:
      run:
        working-directory: typecast-python

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node (mock server for SSE/WS coverage)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"

      - name: Install mock server deps
        working-directory: test-fixtures/mock-server
        run: npm ci

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          if [[ "${{ matrix.python-version }}" == "3.8" || "${{ matrix.python-version }}" == "3.9" ]]; then
            uv pip install --system -e . 'pytest>=7,<9' 'pytest-cov>=5,<6' pytest-mock 'pytest-asyncio<1' 'aioresponses<0.7.9' python-dotenv requests aiohttp
          else
            uv sync --group dev
          fi

      - name: Run coverage (100% gate)
        run: |
          if [[ "${{ matrix.python-version }}" == "3.8" || "${{ matrix.python-version }}" == "3.9" ]]; then
            python -m pytest tests/unit --cov=src/typecast --cov-report=term-missing --cov-report=xml
          else
            make coverage
          fi

  # ============================================
  # JavaScript/TypeScript SDK
  # ============================================
  test-js:
    name: JavaScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-js

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: typecast-js/package.json

      - name: Install dependencies
        run: npm ci

      - name: Run coverage (100% gate)
        run: make coverage

  # ============================================
  # Go SDK
  # ============================================
  test-go:
    name: Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-go

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.17.x"

      - name: Run coverage (100% gate)
        run: make coverage

  # ============================================
  # Java SDK
  # ============================================
  test-java:
    name: Java SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-java

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run coverage (100% gate)
        run: make coverage

  # ============================================
  # Kotlin SDK
  # ============================================
  test-kotlin:
    name: Kotlin SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-kotlin

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Run coverage (100% gate)
        run: make coverage

  # ============================================
  # C# SDK
  # ============================================
  test-csharp:
    name: C# SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-csharp

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up .NET 8
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Run coverage (100% gate)
        run: make coverage

  # ============================================
  # Rust SDK
  # ============================================
  test-rust:
    name: Rust SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-rust

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: llvm-tools-preview

      - name: Check MSRV
        run: |
          rustup toolchain install 1.86.0 --profile minimal
          cargo +1.86.0 test --all-targets --no-default-features

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: typecast-rust

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@75a348306ce8f67c0b06fc62c32a8546140ba955 # cargo-llvm-cov

      - name: Run coverage (100% gate)
        run: make coverage

  # ============================================
  # Swift SDK
  # ============================================
  test-swift:
    name: Swift SDK
    runs-on: macos-latest
    defaults:
      run:
        working-directory: typecast-swift

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run coverage (100% gate)
        run: make coverage

  # ============================================
  # C SDK
  # ============================================
  test-c:
    name: C SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-c

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libcurl4-openssl-dev lcov

      - name: Run coverage (100% gate)
        run: make coverage

  # Dart SDK
  # ============================================
  test-dart:
    name: Dart SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-dart

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run analyzer
        run: dart analyze

      - name: Run coverage
        run: make coverage

  # ============================================
  # Ruby SDK
  # ============================================
  test-ruby:
    name: Ruby SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-ruby

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: typecast-ruby

      - name: Run coverage
        run: make coverage

  # ============================================
  # Summary Job
  # ============================================
  ci-success:
    name: CI Success
    needs:
      - test-python
      - test-js
      - test-go
      - test-java
      - test-kotlin
      - test-csharp
      - test-rust
      - test-swift
      - test-c
      - test-dart
      - test-ruby
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.test-python.result }}" == "failure" ]] || \
             [[ "${{ needs.test-js.result }}" == "failure" ]] || \
             [[ "${{ needs.test-go.result }}" == "failure" ]] || \
             [[ "${{ needs.test-java.result }}" == "failure" ]] || \
             [[ "${{ needs.test-kotlin.result }}" == "failure" ]] || \
             [[ "${{ needs.test-csharp.result }}" == "failure" ]] || \
             [[ "${{ needs.test-rust.result }}" == "failure" ]] || \
             [[ "${{ needs.test-swift.result }}" == "failure" ]] || \
             [[ "${{ needs.test-c.result }}" == "failure" ]] || \
             [[ "${{ needs.test-dart.result }}" == "failure" ]] || \
             [[ "${{ needs.test-ruby.result }}" == "failure" ]]; then
            echo "One or more SDK coverage gates failed"
            exit 1
          fi
          echo "All SDK coverage gates passed at 100%!"
