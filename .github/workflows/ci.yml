name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ============================================
  # Python SDK
  # ============================================
  test-python:
    name: Python SDK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    defaults:
      run:
        working-directory: typecast-python

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (mock server for SSE/WS coverage)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mock server deps
        working-directory: test-fixtures/mock-server
        run: npm ci

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run coverage (100% gate)
        run: make coverage

  # ============================================
  # JavaScript/TypeScript SDK
  # ============================================
  test-js:
    name: JavaScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-js

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: typecast-js/package.json

      - name: Install dependencies
        run: npm ci

      - name: Run coverage (100% gate)
        run: make coverage

  # ============================================
  # Go SDK
  # ============================================
  test-go:
    name: Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-go

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run coverage (100% gate)
        run: make coverage

  # ============================================
  # Java SDK
  # ============================================
  test-java:
    name: Java SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-java

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run coverage (100% gate)
        run: make coverage

  # ============================================
  # Kotlin SDK
  # ============================================
  test-kotlin:
    name: Kotlin SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-kotlin

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run coverage (100% gate)
        run: make coverage

  # ============================================
  # C# SDK
  # ============================================
  test-csharp:
    name: C# SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-csharp

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Run coverage (100% gate)
        run: make coverage

  # ============================================
  # Rust SDK
  # ============================================
  test-rust:
    name: Rust SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-rust

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: typecast-rust

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage (100% gate)
        run: make coverage

  # ============================================
  # Swift SDK
  # ============================================
  test-swift:
    name: Swift SDK
    runs-on: macos-latest
    defaults:
      run:
        working-directory: typecast-swift

    steps:
      - uses: actions/checkout@v4

      - name: Run coverage (100% gate)
        run: make coverage

  # ============================================
  # C SDK
  # ============================================
  test-c:
    name: C SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-c

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libcurl4-openssl-dev lcov

      - name: Run coverage (100% gate)
        run: make coverage

  # Dart SDK
  # ============================================
  test-dart:
    name: Dart SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-dart

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run analyzer
        run: dart analyze

      - name: Run coverage
        run: make coverage

  # ============================================
  # Ruby SDK
  # ============================================
  test-ruby:
    name: Ruby SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typecast-ruby

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: typecast-ruby

      - name: Run coverage
        run: make coverage

  # ============================================
  # Summary Job
  # ============================================
  ci-success:
    name: CI Success
    needs:
      - test-python
      - test-js
      - test-go
      - test-java
      - test-kotlin
      - test-csharp
      - test-rust
      - test-swift
      - test-c
      - test-dart
      - test-ruby
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.test-python.result }}" == "failure" ]] || \
             [[ "${{ needs.test-js.result }}" == "failure" ]] || \
             [[ "${{ needs.test-go.result }}" == "failure" ]] || \
             [[ "${{ needs.test-java.result }}" == "failure" ]] || \
             [[ "${{ needs.test-kotlin.result }}" == "failure" ]] || \
             [[ "${{ needs.test-csharp.result }}" == "failure" ]] || \
             [[ "${{ needs.test-rust.result }}" == "failure" ]] || \
             [[ "${{ needs.test-swift.result }}" == "failure" ]] || \
             [[ "${{ needs.test-c.result }}" == "failure" ]] || \
             [[ "${{ needs.test-dart.result }}" == "failure" ]] || \
             [[ "${{ needs.test-ruby.result }}" == "failure" ]]; then
            echo "One or more SDK coverage gates failed"
            exit 1
          fi
          echo "All SDK coverage gates passed at 100%!"
