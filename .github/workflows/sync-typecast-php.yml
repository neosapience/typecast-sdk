name: Sync PHP SDK subtree

on:
  push:
    branches: [main]
    paths:
      - "typecast-php/**"
      - ".github/workflows/sync-typecast-php.yml"
    tags:
      - "typecast-php/v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Push typecast-php subtree to standalone mirror
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate mirror token
        env:
          TYPECAST_PHP_MIRROR_TOKEN: ${{ secrets.TYPECAST_PHP_MIRROR_TOKEN }}
        run: |
          test -n "$TYPECAST_PHP_MIRROR_TOKEN" || {
            echo "Missing TYPECAST_PHP_MIRROR_TOKEN secret"
            exit 1
          }
          echo "::add-mask::$TYPECAST_PHP_MIRROR_TOKEN"

      - name: Split and push subtree
        env:
          TYPECAST_PHP_MIRROR_TOKEN: ${{ secrets.TYPECAST_PHP_MIRROR_TOKEN }}
        run: |
          set -euo pipefail

          split_sha="$(git subtree split --prefix=typecast-php HEAD)"
          remote="https://x-access-token:${TYPECAST_PHP_MIRROR_TOKEN}@github.com/neosapience/typecast-php.git"
          mirror_main_sha="$(git ls-remote "$remote" refs/heads/main | cut -f1)"

          # The standalone repository is a deprecated Packagist mirror, so its
          # main branch should exactly match the split subtree history.
          git push --force-with-lease="refs/heads/main:${mirror_main_sha}" "$remote" "${split_sha}:refs/heads/main"

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == typecast-php/v* ]]; then
            mirror_tag="${GITHUB_REF_NAME#typecast-php/}"
            git push "$remote" "${split_sha}:refs/tags/${mirror_tag}"
          fi
