name: coverage-swift
on:
  push:
    branches: [main]
    paths:
      - 'typecast-swift/**'
      - '.github/workflows/coverage-swift.yml'
  pull_request:
    paths:
      - 'typecast-swift/**'
      - '.github/workflows/coverage-swift.yml'
jobs:
  coverage:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run coverage
        working-directory: typecast-swift
        run: make coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-swift
          path: typecast-swift/coverage-summary.txt
