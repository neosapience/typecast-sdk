name: coverage-kotlin

on:
  push:
    branches: [main]
    paths:
      - 'typecast-kotlin/**'
      - '.github/workflows/coverage-kotlin.yml'
  pull_request:
    paths:
      - 'typecast-kotlin/**'
      - '.github/workflows/coverage-kotlin.yml'

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run coverage gate
        working-directory: typecast-kotlin
        run: make coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-kotlin
          path: |
            typecast-kotlin/build/reports/jacoco/test/html/
            typecast-kotlin/build/reports/jacoco/test/jacocoTestReport.xml
