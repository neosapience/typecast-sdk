name: coverage-java

on:
  push:
    branches: [main]
    paths:
      - 'typecast-java/**'
      - '.github/workflows/coverage-java.yml'
  pull_request:
    paths:
      - 'typecast-java/**'
      - '.github/workflows/coverage-java.yml'

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('typecast-java/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run coverage with 100% gate
        working-directory: typecast-java
        run: make coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-java
          path: |
            typecast-java/target/site/jacoco/
