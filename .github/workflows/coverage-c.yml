name: coverage-c

on:
  push:
    branches: [main]
    paths:
      - 'typecast-c/**'
      - '.github/workflows/coverage-c.yml'
  pull_request:
    paths:
      - 'typecast-c/**'
      - '.github/workflows/coverage-c.yml'

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps (gcc, cmake, lcov, libcurl)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake lcov libcurl4-openssl-dev

      - name: Run coverage (gate enforced in Makefile)
        working-directory: typecast-c
        run: make coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-c
          path: |
            typecast-c/coverage-summary.txt
            typecast-c/coverage.filtered.info
